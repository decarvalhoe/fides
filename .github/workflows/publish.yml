name: Publish to PyPI

# Publie sur PyPI à la publication d'une release (ou via "Run workflow").
# Trusted publishing (OIDC) : AUCUN token. Configuration PyPI (une seule fois) :
#   pypi.org -> Manage -> Publishing -> Add a pending publisher :
#     PyPI Project Name = fides-mastering
#     Owner             = decarvalhoe
#     Repository name   = fides            <-- le DÉPÔT GitHub (pas le nom du projet)
#     Workflow name     = publish.yml      <-- le NOM DE FICHIER (pas "Publish to PyPI")
#     Environment name  = (laisser vide)
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # requis pour le trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
